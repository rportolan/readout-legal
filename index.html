<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Readout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111827;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { text-align: center; max-width: 560px; }
    h1 { font-size: 48px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
    p { color: #9ca3af; font-size: 16px; line-height: 1.6; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a {
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
      border: 1px solid #374151;
      padding: 10px 20px;
      border-radius: 10px;
      transition: background 0.18s ease, border-color 0.18s ease;
    }
    a:hover {
      background: #1f2937;
      border-color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Readout</h1>
    <p>Suis tes lectures, enrichis ta culture, progresse chaque jour.</p>
    <div class="links">
      <a href="/terms">Conditions d'utilisation</a>
      <a href="/privacy">Politique de confidentialité</a>
      <a href="/delete-account">Supprimer mon compte</a>
    </div>
  </div>
</body>
</html>
